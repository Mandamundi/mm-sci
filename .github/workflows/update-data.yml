name: Update SCI Data

on:
  schedule:
    - cron: '0 6 * * 1'    # every Monday 06:00 UTC
  workflow_dispatch:         # manual trigger from GitHub UI

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install playwright beautifulsoup4 pandas openpyxl
          playwright install chromium
          playwright install-deps chromium

      - name: Run scraper
        run: python scripts/ratings_scraper.py

      - name: Run index computation
        run: python scripts/compute_index.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/ agencies/
          git diff --staged --quiet || git commit -m "data: auto-update $(date -u +%Y-%m-%d)"
          git push